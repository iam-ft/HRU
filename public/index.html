<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reality Updated</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F4F0; color: #1a1a1a; font-family: 'Inter', sans-serif; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #eee; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect } = React;

const ACCENT = '#5B52CC';

// ── Shared atoms ──────────────────────────────────────────────

function Badge({ children, color }) {
  const colors = {
    now:           { bg: '#ede9fe', text: '#6d28d9' },
    legs:          { bg: '#d1fae5', text: '#065f46' },
    trackA:        { bg: '#e0e7ff', text: '#3730a3' },
    trackB:        { bg: '#cffafe', text: '#155e75' },
    format:        { bg: '#f3f4f6', text: '#374151' },
    prio_high:     { bg: '#fee2e2', text: '#b91c1c' },
    prio_medium:   { bg: '#fef9c3', text: '#854d0e' },
    prio_low:      { bg: '#f3f4f6', text: '#6b7280' },
  };
  const s = colors[color] || colors.format;
  return (
    <span style={{
      background: s.bg, color: s.text,
      fontSize: 11, fontWeight: 500, padding: '2px 8px',
      borderRadius: 4, letterSpacing: '0.03em',
    }}>{children}</span>
  );
}

function Spinner() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 16, padding: 48 }}>
      <div style={{
        width: 36, height: 36, border: `3px solid #ddd`,
        borderTop: `3px solid ${ACCENT}`, borderRadius: '50%',
        animation: 'spin 0.8s linear infinite',
      }} />
      <p style={{ color: '#888', fontSize: 14 }}>Running… this takes 2–4 minutes</p>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

// ── Clipping view ─────────────────────────────────────────────

function StoryCard({ story, selected, onToggle }) {
  return (
    <div
      onClick={() => onToggle(story.id ?? story.number)}
      style={{
        background: selected ? '#eeedfb' : '#fff',
        border: `1.5px solid ${selected ? ACCENT : '#e5e7eb'}`,
        borderRadius: 8, padding: 20, cursor: 'pointer',
        transition: 'all 0.15s ease',
        position: 'relative',
        boxShadow: selected ? `0 0 0 2px ${ACCENT}22` : '0 1px 3px rgba(0,0,0,0.06)',
      }}
    >
      <div style={{ position: 'absolute', top: 16, right: 16 }}>
        <div style={{
          width: 18, height: 18, borderRadius: 4,
          border: `2px solid ${selected ? ACCENT : '#d1d5db'}`,
          background: selected ? ACCENT : 'transparent',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          {selected && <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 4L3.5 6.5L9 1" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>}
        </div>
      </div>

      <div style={{ display: 'flex', gap: 8, marginBottom: 10, flexWrap: 'wrap', paddingRight: 28 }}>
        {story.urgency && <Badge color={story.urgency === 'Now' ? 'now' : 'legs'}>{story.urgency}</Badge>}
        {story.track && <Badge color={story.track === 'A' ? 'trackA' : 'trackB'}>Track {story.track}</Badge>}
        {story.tiktok_format && <Badge color="format">{story.tiktok_format}</Badge>}
        {story.editorial_priority && (
          <Badge color={`prio_${story.editorial_priority}`}>{story.editorial_priority}</Badge>
        )}
      </div>

      <p style={{ fontSize: 15, fontWeight: 600, lineHeight: 1.4, marginBottom: 4, paddingRight: 8, color: '#111' }}>
        {story.headline}
      </p>
      {story.editorial_axis && (
        <p style={{ fontSize: 12, color: '#9ca3af', fontStyle: 'italic', marginBottom: 8 }}>
          {story.editorial_axis}
        </p>
      )}
      <p style={{ fontSize: 13, color: '#555', lineHeight: 1.6, marginBottom: 10 }}>
        {story.what_happened || story.summary}
      </p>
      <p style={{ fontSize: 12, color: '#888', fontStyle: 'italic' }}>
        ↗ {story.angle_hint}
      </p>
      <p style={{ fontSize: 11, color: '#aaa', marginTop: 6 }}>
        {story.source} · {story.protagonist}
      </p>
    </div>
  );
}

function ClippingView({ onScriptReady, onClipDate, initialStories }) {
  const [stories, setStories] = useState(initialStories || []);
  const [selected, setSelected] = useState(new Set(initialStories?.map(s => s.id ?? s.number) || []));
  const [loading, setLoading] = useState(false);
  const [scriptLoading, setScriptLoading] = useState(false);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState(initialStories?.length ? 'loaded' : 'idle');

  useEffect(() => {
    if (initialStories?.length) {
      setStories(initialStories);
      setSelected(new Set(initialStories.map(s => s.id ?? s.number)));
      setMode('loaded');
      onClipDate(new Date());
    }
  }, [initialStories]);

  const runClipping = async () => {
    setLoading(true); setError(null);
    try {
      const res = await fetch('/api/clip', { method: 'POST' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Unknown error');
      setStories(data);
      setMode('loaded');
      onClipDate(new Date());
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const loadExamples = async () => {
    setLoading(true); setError(null);
    try {
      const res = await fetch('/api/example-clips');
      const data = await res.json();
      setStories(data);
      setMode('loaded');
      onClipDate(new Date());
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const toggle = (num) => {
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(num)) next.delete(num);
      else if (next.size < 5) next.add(num);
      return next;
    });
  };

  const generateScript = async () => {
    const chosen = stories.filter(s => selected.has(s.id ?? s.number));
    setScriptLoading(true); setError(null);
    try {
      const res = await fetch('/api/script', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ stories: chosen }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Unknown error');
      onScriptReady(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setScriptLoading(false);
    }
  };

  const loadExampleScript = async () => {
    setScriptLoading(true);
    try {
      const res = await fetch('/api/example-script');
      const data = await res.json();
      onScriptReady(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setScriptLoading(false);
    }
  };

  const selCount = selected.size;
  const canGenerate = selCount >= 1 && selCount <= 5;

  return (
    <div>
      <div style={{ display: 'flex', gap: 12, marginBottom: 32, flexWrap: 'wrap', alignItems: 'center' }}>
        <button
          onClick={runClipping}
          disabled={loading || scriptLoading}
          style={{
            background: ACCENT, color: '#fff', border: 'none',
            borderRadius: 6, padding: '10px 20px', fontSize: 14, fontWeight: 600,
            cursor: (loading || scriptLoading) ? 'not-allowed' : 'pointer',
            opacity: (loading || scriptLoading) ? 0.6 : 1,
          }}
        >
          {loading ? 'Running…' : 'Run clipping'}
        </button>
        <button
          onClick={loadExamples}
          disabled={loading || scriptLoading}
          style={{
            background: '#fff', color: '#555', border: '1.5px solid #d1d5db',
            borderRadius: 6, padding: '10px 20px', fontSize: 14,
            cursor: 'pointer',
          }}
        >
          Load examples
        </button>
        <button
          onClick={loadExampleScript}
          disabled={loading || scriptLoading}
          style={{
            background: 'transparent', color: '#999', border: '1px solid #e5e7eb',
            borderRadius: 6, padding: '10px 20px', fontSize: 14,
            cursor: 'pointer',
          }}
        >
          Preview script →
        </button>
      </div>

      {error && (
        <div style={{ background: '#fef2f2', border: '1px solid #fecaca', borderRadius: 6, padding: 16, marginBottom: 24, color: '#b91c1c', fontSize: 13 }}>
          {error}
        </div>
      )}

      {loading && <Spinner />}

      {!loading && mode === 'loaded' && (
        <>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
            <p style={{ color: '#888', fontSize: 13 }}>
              {stories.length} stories · seleccioná hasta 5 para el episodio
            </p>
            <span style={{ fontSize: 13, color: selCount > 0 ? ACCENT : '#aaa', fontWeight: 600 }}>
              {selCount} seleccionadas
            </span>
          </div>

          <div style={{ display: 'grid', gap: 10, marginBottom: 100 }}>
            {stories.map(s => (
              <StoryCard
                key={s.id ?? s.number}
                story={s}
                selected={selected.has(s.id ?? s.number)}
                onToggle={toggle}
              />
            ))}
          </div>

          <div style={{
            position: 'sticky', bottom: 0,
            background: 'linear-gradient(to top, #F5F4F0 80%, transparent)',
            paddingTop: 24, paddingBottom: 24,
          }}>
            <button
              onClick={generateScript}
              disabled={!canGenerate || scriptLoading}
              style={{
                background: canGenerate ? ACCENT : '#e5e7eb',
                color: canGenerate ? '#fff' : '#9ca3af',
                border: 'none', borderRadius: 6,
                padding: '13px 28px', fontSize: 15, fontWeight: 600,
                cursor: canGenerate ? 'pointer' : 'not-allowed',
                transition: 'all 0.2s',
                width: '100%',
              }}
            >
              {scriptLoading ? 'Generando guion…' : `Generate script → (${selCount} seleccionadas)`}
            </button>
          </div>
        </>
      )}
    </div>
  );
}

// ── Script view ───────────────────────────────────────────────

function ScriptBlock({ block, onChange }) {
  const isTagline = block.order === 'tagline';
  const SCRIPT_FIELDS = ['hook', 'context', 'core', 'close'];
  const hasStructuredScript = !!block.script;

  const updateScriptField = (field, val) => {
    const updated = { ...block.script, [field]: val };
    onChange({ ...block, script: updated, mika_says: SCRIPT_FIELDS.map(f => updated[f]).join(' ') });
  };

  const sentences = (block.mika_says || '').split('\n').filter(s => s.trim());
  const updateSentence = (i, val) => {
    const updated = [...sentences];
    updated[i] = val;
    onChange({ ...block, mika_says: updated.join('\n') });
  };

  const textareaStyle = {
    width: '100%', background: '#fafafa',
    border: '1.5px solid #e5e7eb', borderRadius: 4,
    color: '#111', fontFamily: 'IBM Plex Mono', fontSize: 14,
    lineHeight: 1.7, padding: '8px 12px', resize: 'vertical',
    outline: 'none',
  };

  return (
    <div style={{
      border: `1.5px solid ${isTagline ? '#d1d5db' : '#e5e7eb'}`,
      borderRadius: 8, marginBottom: 16,
      background: isTagline ? '#f9f9f6' : '#fff',
      boxShadow: '0 1px 3px rgba(0,0,0,0.04)',
    }}>
      {!isTagline && (
        <div style={{ padding: '14px 20px', borderBottom: '1px solid #f3f4f6', background: '#fafafa', borderRadius: '8px 8px 0 0' }}>
          <p style={{ fontSize: 12, color: '#6b7280', fontFamily: 'IBM Plex Mono' }}>
            {block.id ?? block.order}. {block.headline}
          </p>
        </div>
      )}

      <div style={{ padding: '16px 20px 0' }}>
        <p style={{ fontSize: 10, color: '#9ca3af', letterSpacing: '0.1em', fontWeight: 600, marginBottom: 10 }}>
          MIKA SAYS
        </p>
        {isTagline ? (
          <textarea
            value={block.mika_says}
            onChange={e => onChange({ ...block, mika_says: e.target.value })}
            style={{ ...textareaStyle, background: '#f9f9f6', color: '#374151', minHeight: 70 }}
            onFocus={e => e.target.style.borderColor = ACCENT}
            onBlur={e => e.target.style.borderColor = '#e5e7eb'}
          />
        ) : hasStructuredScript ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {SCRIPT_FIELDS.map(field => (
              <div key={field}>
                <p style={{ fontSize: 9, color: '#d1d5db', letterSpacing: '0.1em', fontWeight: 600, marginBottom: 4, textTransform: 'uppercase' }}>
                  {field}
                </p>
                <textarea
                  value={block.script[field] || ''}
                  onChange={e => updateScriptField(field, e.target.value)}
                  rows={2}
                  style={textareaStyle}
                  onFocus={e => e.target.style.borderColor = ACCENT}
                  onBlur={e => e.target.style.borderColor = '#e5e7eb'}
                />
              </div>
            ))}
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {sentences.map((sentence, i) => (
              <textarea
                key={i}
                value={sentence}
                onChange={e => updateSentence(i, e.target.value)}
                rows={2}
                style={textareaStyle}
                onFocus={e => e.target.style.borderColor = ACCENT}
                onBlur={e => e.target.style.borderColor = '#e5e7eb'}
              />
            ))}
          </div>
        )}
      </div>

      {!isTagline && block.show !== undefined && (
        <div style={{ padding: '12px 20px 16px' }}>
          <p style={{ fontSize: 10, color: '#d1d5db', letterSpacing: '0.1em', fontWeight: 600, marginBottom: 6 }}>
            SHOW
          </p>
          <textarea
            value={block.show}
            onChange={e => onChange({ ...block, show: e.target.value })}
            style={{
              width: '100%', background: '#fafafa',
              border: '1.5px solid #f3f4f6', borderRadius: 4,
              color: '#9ca3af', fontFamily: 'IBM Plex Mono', fontSize: 12,
              fontStyle: 'italic', lineHeight: 1.7, padding: '8px 12px',
              resize: 'vertical', minHeight: 60, outline: 'none',
            }}
            onFocus={e => e.target.style.borderColor = '#9ca3af'}
            onBlur={e => e.target.style.borderColor = '#f3f4f6'}
          />
        </div>
      )}
    </div>
  );
}

function ScriptView({ script, clipDate, onBack }) {
  const isNewFormat = !Array.isArray(script) && script.stories;
  const episodeTitle = isNewFormat ? script.episode_title : null;
  const [blocks, setBlocks] = useState(isNewFormat ? script.stories : script);
  const [copied, setCopied] = useState(false);

  const updateBlock = useCallback((index, updated) => {
    setBlocks(prev => prev.map((b, i) => i === index ? updated : b));
  }, []);

  const formatDate = (d) => {
    if (!d) return new Date().toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    return new Date(d).toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  };

  const buildCopyText = (mikaOnly) => {
    const titleLine = episodeTitle ? `${episodeTitle}\n\n` : '';
    const header = `Reality Updated Script — ${formatDate(clipDate)}\n${'─'.repeat(40)}\n\n${titleLine}`;
    const body = blocks.map(b => {
      if (b.order === 'tagline') return `---\n${b.mika_says}`;
      if (mikaOnly) return b.mika_says;
      return `${b.mika_says}\n\nSHOW:\n${b.show}`;
    }).join('\n\n---\n\n');
    return header + body;
  };

  const copyScript = () => {
    navigator.clipboard.writeText(buildCopyText(false));
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  };

  const copyMikaOnly = () => {
    navigator.clipboard.writeText(buildCopyText(true));
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  };

  const CopyButtons = () => (
    <div style={{ display: 'flex', gap: 10 }}>
      <button onClick={copyMikaOnly} style={{
        background: '#fff', color: '#374151', border: '1.5px solid #d1d5db',
        borderRadius: 6, padding: '8px 16px', fontSize: 13, cursor: 'pointer', fontWeight: 500,
      }}>
        Copy Mika only
      </button>
      <button onClick={copyScript} style={{
        background: ACCENT, color: '#fff', border: 'none',
        borderRadius: 6, padding: '8px 16px', fontSize: 13, fontWeight: 600, cursor: 'pointer',
      }}>
        {copied ? 'Copiado ✓' : 'Copy full script'}
      </button>
    </div>
  );

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 28 }}>
        <button onClick={onBack} style={{ background: 'none', border: 'none', color: '#888', fontSize: 13, cursor: 'pointer', padding: 0 }}>
          ← Volver al clipping
        </button>
        <CopyButtons />
      </div>

      {episodeTitle && (
        <p style={{ fontFamily: 'IBM Plex Mono', fontSize: 13, fontWeight: 500, color: '#374151', marginBottom: 24, letterSpacing: '0.02em' }}>
          {episodeTitle}
        </p>
      )}

      {blocks.map((block, i) => (
        <ScriptBlock key={i} block={block} onChange={(updated) => updateBlock(i, updated)} />
      ))}

      <div style={{ marginTop: 32, paddingTop: 24, borderTop: '1px solid #e5e7eb', display: 'flex', justifyContent: 'flex-end' }}>
        <CopyButtons />
      </div>
    </div>
  );
}

// ── App shell ─────────────────────────────────────────────────

function App() {
  const [view, setView] = useState('clip');
  const [script, setScript] = useState(null);
  const [clipDate, setClipDate] = useState(null);
  const [initialStories, setInitialStories] = useState(null);

  useEffect(() => {
    const params = new URLSearchParams(location.search);
    const date = params.get('date');
    const ids = params.get('ids');
    if (!date || !ids) return;
    const idList = ids.split(',').map(s => s.trim());
    fetch(`https://iam-ft.github.io/HRU/clips/${date}.json`)
      .then(r => r.json())
      .then(stories => {
        const filtered = stories.filter(s => idList.includes(String(s.id ?? s.number)));
        if (filtered.length) {
          setInitialStories(filtered);
          window.history.replaceState({}, '', '/');
        }
      })
      .catch(() => {});
  }, []);

  const handleScriptReady = (data) => { setScript(data); setView('script'); };

  return (
    <div style={{ maxWidth: 740, margin: '0 auto', padding: '32px 24px' }}>
      <div style={{ marginBottom: 36 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 12 }}>
          <h1 style={{ fontFamily: 'IBM Plex Mono', fontSize: 17, fontWeight: 500, letterSpacing: '0.06em', color: '#111' }}>
            REALITY UPDATED
          </h1>
          <span style={{
            fontSize: 11, color: '#fff', background: ACCENT,
            padding: '2px 8px', borderRadius: 4, letterSpacing: '0.08em', fontWeight: 600,
          }}>
            {view === 'clip' ? 'CLIPPING' : 'SCRIPT'}
          </span>
        </div>
        <div style={{ height: 1, background: '#e5e7eb', marginTop: 14 }} />
      </div>

      {view === 'clip' && (
        <ClippingView onScriptReady={handleScriptReady} onClipDate={setClipDate} initialStories={initialStories} />
      )}
      {view === 'script' && script && (
        <ScriptView script={script} clipDate={clipDate} onBack={() => setView('clip')} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
